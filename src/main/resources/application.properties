# Using the London-born Gemma 2 model via Ollama
quarkus.langchain4j.ollama.chat-model.model-id=llama3.2
quarkus.langchain4j.ollama.base-url=http://localhost:11434

# Fine-tuning the 'vibe' for the UK market
quarkus.langchain4j.ollama.chat-model.temperature=0.3

# Logging requests and responses
quarkus.langchain4j.ollama.log-requests=true
quarkus.langchain4j.ollama.log-responses=true

# Observability
quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
# Enterprise ERP Integration
erp-api/mp-rest/url=http://localhost:8081
erp-api/mp-rest/scope=jakarta.inject.Singleton
